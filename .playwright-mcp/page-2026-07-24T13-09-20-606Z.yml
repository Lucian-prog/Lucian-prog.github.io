          - paragraph [ref=f1e65]:
            - text: 这样写的好处是语义更清楚，不需要在
            - code [ref=f1e66]: reg
            - text: 和
            - code [ref=f1e67]: wire
            - text: 之间反复纠结。不过
            - code [ref=f1e68]: logic
            - text: 不是万能的。如果是三态总线或多驱动信号，仍然需要使用
            - code [ref=f1e69]: tri
            - text: 、
            - code [ref=f1e70]: wire
            - text: 这类 net 类型。也就是说，
            - code [ref=f1e71]: logic
            - text: 适合单驱动 RTL 信号，但不能掩盖硬件连接关系本身。
          - heading [level=2] [ref=f1e72]:
            - link "用 always_ff 和 always_comb 表达硬件意图":
              - /url: "#用-always-ff-和-always-comb-表达硬件意图"
            - text: 用
