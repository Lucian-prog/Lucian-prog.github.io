                  - cell [ref=f1e55]:
                    - generic [ref=f1e56]: "123456789"
                  - cell "module and2 ( input logic a_i, input logic b_i, output logic y_o ); assign y_o = a_i & b_i; endmodule" [ref=f1e57]:
                    - generic [ref=f1e58]:
                      - generic [ref=f1e59]: module and2 (
                      - generic [ref=f1e60]: input logic a_i,
                      - generic [ref=f1e61]: input logic b_i,
                      - generic [ref=f1e62]: output logic y_o
                      - text: );
                      - generic [ref=f1e63]: assign y_o = a_i & b_i;
