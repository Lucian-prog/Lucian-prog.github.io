          - paragraph [ref=f1e46]:
            - text: SystemVerilog 引入了
            - code [ref=f1e47]: logic
            - text: ，让大多数单驱动信号都可以统一声明：
          - figure [ref=f1e48]:
            - generic [ref=f1e49]:
              - generic [ref=f1e50]: systemverilog
