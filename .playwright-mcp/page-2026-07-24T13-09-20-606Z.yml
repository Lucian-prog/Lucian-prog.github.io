                  - rowgroup [ref=f1e193]:
                    - row [ref=f1e194]:
                      - cell [ref=f1e195]:
                        - generic [ref=f1e196]: "1234567"
                      - cell "always_ff @(posedge clk_i or negedge rst_n_i) begin if (!rst_n_i) begin state_q <= S_IDLE; end else begin state_q <= state_d; end end" [ref=f1e197]:
                        - generic [ref=f1e198]:
                          - generic [ref=f1e199]: always_ff @(posedge clk_i or negedge rst_n_i) begin
                          - generic [ref=f1e200]: if (!rst_n_i) begin
                          - text: state_q <= S_IDLE;
                          - generic [ref=f1e201]: end else begin
                          - text: state_q <= state_d;
                          - generic [ref=f1e202]: end
                          - generic [ref=f1e203]: end
            - listitem [ref=f1e204]:
              - paragraph [ref=f1e205]: 第二段：下一状态逻辑：
              - figure [ref=f1e206]:
                - generic [ref=f1e207]:
                  - generic [ref=f1e208]: systemverilog
                  - button "Copy" [ref=f1e209] [cursor=pointer]
                - table [ref=f1e210]:
                  - rowgroup [ref=f1e211]:
                    - row [ref=f1e212]:
                      - cell [ref=f1e213]:
                        - generic [ref=f1e214]: "12345678910111213141516171819202122232425"
                      - 'cell "always_comb begin state_d = state_q; unique case (state_q) S_IDLE: begin if (start_i) begin state_d = S_BUSY; end end S_BUSY: begin if (done_i) begin state_d = S_DONE; end end S_DONE: begin state_d = S_IDLE; end default: begin state_d = S_IDLE; end endcase end" [ref=f1e215]':
                        - generic [ref=f1e216]:
                          - generic [ref=f1e217]: always_comb begin
                          - text: state_d = state_q;
                          - generic [ref=f1e218]: unique case (state_q)
                          - generic [ref=f1e219]: "S_IDLE: begin"
                          - generic [ref=f1e220]: if (start_i) begin
                          - text: state_d = S_BUSY;
                          - generic [ref=f1e221]: end
                          - generic [ref=f1e222]: end
                          - generic [ref=f1e223]: "S_BUSY: begin"
                          - generic [ref=f1e224]: if (done_i) begin
                          - text: state_d = S_DONE;
                          - generic [ref=f1e225]: end
                          - generic [ref=f1e226]: end
                          - generic [ref=f1e227]: "S_DONE: begin"
                          - text: state_d = S_IDLE;
                          - generic [ref=f1e228]: end
                          - generic [ref=f1e229]: "default: begin"
                          - text: state_d = S_IDLE;
                          - generic [ref=f1e230]: end
                          - generic [ref=f1e231]: endcase
                          - generic [ref=f1e232]: end
            - listitem [ref=f1e233]:
              - paragraph [ref=f1e234]: 第三段：输出逻辑：
              - figure [ref=f1e235]:
                - generic [ref=f1e236]:
                  - generic [ref=f1e237]: verilog
                  - button "Copy" [ref=f1e238] [cursor=pointer]
                - table [ref=f1e239]:
                  - rowgroup [ref=f1e240]:
                    - row [ref=f1e241]:
                      - cell [ref=f1e242]
                      - cell "assign busy_o = (state_q == S_BUSY);" [ref=f1e244]
          - paragraph [ref=f1e247]: 这对后续调试也有帮助。看波形时，状态名比单纯的二进制编码更直观。
          - heading "我接下来的迁移思路我接下来的迁移思路" [level=2] [ref=f1e248]:
            - link "我接下来的迁移思路":
              - /url: "#我接下来的迁移思路"
            - text: 我接下来的迁移思路
          - paragraph [ref=f1e249]: 这章读完后，我不会立刻把所有 Verilog 模块都改成 SystemVerilog。更合理的做法是逐步迁移：
          - list [ref=f1e250]:
            - listitem [ref=f1e251]:
              - text: 新写的小模块优先使用
              - code [ref=f1e252]: .sv
              - text: 。
            - listitem [ref=f1e253]: 组合逻辑和简单寄存器模块先迁移。
            - listitem [ref=f1e254]: FIFO、CDC、总线协议这类模块暂时保持谨慎。
            - listitem [ref=f1e255]: 每迁移一个模块，都保留 testbench 验证原有行为。
            - listitem [ref=f1e256]: 重点关注综合 warning，尤其是 latch、多驱动、位宽截断和未复位寄存器。
          - paragraph [ref=f1e257]: SystemVerilog 的学习不应该停留在语法层面。对 RTL 设计来说，更重要的是它能否帮助我写出结构清晰、时序明确、便于验证的硬件。
