            - text: 和
            - code [ref=f1e74]: always_comb
            - text: 表达硬件意图
          - paragraph [ref=f1e75]: Verilog 中常见的组合逻辑写法是：
          - figure [ref=f1e76]:
            - generic [ref=f1e77]:
              - generic [ref=f1e78]: verilog
              - button "Copy" [ref=f1e79] [cursor=pointer]
            - table [ref=f1e80]:
              - rowgroup [ref=f1e81]:
                - row [ref=f1e82]:
                  - cell [ref=f1e83]:
                    - generic [ref=f1e84]: "123"
                  - cell "always @(*) begin y = a & b; end" [ref=f1e85]:
                    - generic [ref=f1e86]:
                      - generic [ref=f1e87]: always @(*) begin
                      - text: y = a & b;
                      - generic [ref=f1e88]: end
          - paragraph [ref=f1e89]: SystemVerilog 中更推荐：
          - figure [ref=f1e90]:
            - generic [ref=f1e91]:
              - generic [ref=f1e92]: systemverilog
              - button "Copy" [ref=f1e93] [cursor=pointer]
            - table [ref=f1e94]:
              - rowgroup [ref=f1e95]:
                - row [ref=f1e96]:
                  - cell [ref=f1e97]:
                    - generic [ref=f1e98]: "123"
                  - cell "always_comb begin y_o = a_i & b_i; end" [ref=f1e99]:
                    - generic [ref=f1e100]:
                      - generic [ref=f1e101]: always_comb begin
                      - text: y_o = a_i & b_i;
                      - generic [ref=f1e102]: end
          - paragraph [ref=f1e103]: 对于时序逻辑，则使用：
          - figure [ref=f1e104]:
            - generic [ref=f1e105]:
              - generic [ref=f1e106]: systemverilog
              - button "Copy" [ref=f1e107] [cursor=pointer]
            - table [ref=f1e108]:
              - rowgroup [ref=f1e109]:
                - row [ref=f1e110]:
                  - cell [ref=f1e111]:
                    - generic [ref=f1e112]: "1234567"
                  - cell "always_ff @(posedge clk_i or negedge rst_n_i) begin if (!rst_n_i) begin q_o <= '0; end else begin q_o <= d_i; end end" [ref=f1e113]:
                    - generic [ref=f1e114]:
                      - generic [ref=f1e115]: always_ff @(posedge clk_i or negedge rst_n_i) begin
                      - generic [ref=f1e116]: if (!rst_n_i) begin
                      - generic [ref=f1e117]: q_o <= '0;
                      - generic [ref=f1e118]: end else begin
                      - text: q_o <= d_i;
                      - generic [ref=f1e119]: end
                      - generic [ref=f1e120]: end
          - paragraph [ref=f1e121]: 这两个关键字的意义在于，它们把设计者的意图写进了代码：这里应该是组合逻辑，那里应该是触发器。工具也能据此检查一些不合理写法。
          - paragraph [ref=f1e122]: 对我来说，这是 SystemVerilog 相比 Verilog 很实用的一点。它不是改变了硬件结构，而是让代码和硬件结构之间的对应关系更明确。
          - heading "阻塞赋值和非阻塞赋值仍然是重点阻塞赋值和非阻塞赋值仍然是重点" [level=2] [ref=f1e123]:
            - link "阻塞赋值和非阻塞赋值仍然是重点":
              - /url: "#阻塞赋值和非阻塞赋值仍然是重点"
            - text: 阻塞赋值和非阻塞赋值仍然是重点
          - paragraph [ref=f1e124]: 从 Verilog 迁移到 SystemVerilog 后，阻塞赋值和非阻塞赋值的规则并没有消失：
          - list [ref=f1e125]:
            - listitem [ref=f1e126]:
              - text: 组合逻辑中通常使用阻塞赋值
              - code [ref=f1e127]: =
              - text: ；
            - listitem [ref=f1e128]:
              - text: 时序逻辑中通常使用非阻塞赋值
              - code [ref=f1e129]: <=
              - text: 。
          - paragraph [ref=f1e130]: 例如两个串联触发器应该写成：
          - figure [ref=f1e131]:
            - generic [ref=f1e132]:
              - generic [ref=f1e133]: systemverilog
              - button "Copy" [ref=f1e134] [cursor=pointer]
            - table [ref=f1e135]:
              - rowgroup [ref=f1e136]:
                - row [ref=f1e137]:
                  - cell [ref=f1e138]:
                    - generic [ref=f1e139]: "123456789"
                  - cell "always_ff @(posedge clk_i or negedge rst_n_i) begin if (!rst_n_i) begin n1_q <= 1'b0; q_o <= 1'b0; end else begin n1_q <= d_i; q_o <= n1_q; end end" [ref=f1e140]:
                    - generic [ref=f1e141]:
                      - generic [ref=f1e142]: always_ff @(posedge clk_i or negedge rst_n_i) begin
                      - generic [ref=f1e143]: if (!rst_n_i) begin
                      - generic [ref=f1e144]: n1_q <= 1'b0;
                      - generic [ref=f1e145]: q_o <= 1'b0;
                      - generic [ref=f1e146]: end else begin
                      - text: n1_q <= d_i; q_o <= n1_q;
                      - generic [ref=f1e147]: end
                      - generic [ref=f1e148]: end
          - paragraph [ref=f1e149]:
            - text: 这里
            - code [ref=f1e150]: q_o
            - text: 采到的是上一拍的
            - code [ref=f1e151]: n1_q
            - text: ，硬件上对应两个背靠背的触发器。如果在时序逻辑里随意使用阻塞赋值，仿真结果可能和实际想表达的寄存器级结构不一致。
          - heading "FSM 更适合用枚举状态FSM 更适合用枚举状态" [level=2] [ref=f1e152]:
            - link "FSM 更适合用枚举状态":
              - /url: "#FSM-更适合用枚举状态"
            - text: FSM 更适合用枚举状态
          - paragraph [ref=f1e153]:
            - text: 以前写 Verilog 状态机时，我常用
            - code [ref=f1e154]: localparam
            - text: 定义状态：
          - figure [ref=f1e155]:
            - generic [ref=f1e156]:
              - generic [ref=f1e157]: verilog
              - button "Copy" [ref=f1e158] [cursor=pointer]
            - table [ref=f1e159]:
              - rowgroup [ref=f1e160]:
                - row [ref=f1e161]:
                  - cell [ref=f1e162]:
                    - generic [ref=f1e163]: "123"
                  - cell "localparam S_IDLE = 2'd0; localparam S_RUN = 2'd1; localparam S_DONE = 2'd2;" [ref=f1e164]:
                    - generic [ref=f1e165]:
                      - generic [ref=f1e166]: localparam S_IDLE = 2'd0;
                      - generic [ref=f1e167]: localparam S_RUN = 2'd1;
                      - generic [ref=f1e168]: localparam S_DONE = 2'd2;
          - paragraph [ref=f1e169]: SystemVerilog 可以用枚举类型：
          - figure [ref=f1e170]:
            - generic [ref=f1e171]:
              - generic [ref=f1e172]: systemverilog
              - button "Copy" [ref=f1e173] [cursor=pointer]
            - table [ref=f1e174]:
              - rowgroup [ref=f1e175]:
                - row [ref=f1e176]:
                  - cell [ref=f1e177]:
                    - generic [ref=f1e178]: "1234567"
                  - 'cell "typedef enum logic [1:0] { S_IDLE, S_RUN, S_DONE } state_t; state_t state_q, state_d;" [ref=f1e179]':
                    - generic [ref=f1e180]:
                      - generic [ref=f1e181]: "typedef enum logic [1:0] {"
                      - text: "S_IDLE, S_RUN, S_DONE} state_t;state_t state_q, state_d;"
          - paragraph [ref=f1e182]:
            - text: 这种写法更接近“状态机”的语义。
            - code [ref=f1e183]: state_q
            - text: 表示当前状态寄存器，
            - code [ref=f1e184]: state_d
            - text: 表示下一状态组合逻辑。配合三段式 FSM，代码结构会更清楚：
          - list [ref=f1e185]:
            - listitem [ref=f1e186]:
              - paragraph [ref=f1e187]: 第一段：状态寄存器：
              - figure [ref=f1e188]:
                - generic [ref=f1e189]:
                  - generic [ref=f1e190]: systemverilog
                  - button "Copy" [ref=f1e191] [cursor=pointer]
