          - paragraph [ref=f1e41]:
            - text: 传统 Verilog 中，
            - code [ref=f1e42]: reg
            - text: 和
            - code [ref=f1e43]: wire
            - text: 很容易让初学者误解。
            - code [ref=f1e44]: reg
            - text: 并不一定综合成寄存器，它只是表示这个信号可以在
